<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PWA Demo</title>

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Color barra móvil -->
  <meta name="theme-color" content="#0d6efd">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d6efd;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
  </style>
</head>

<body>
  <div>
    <h1>🚀 Mi PWA</h1>
    <p>Hola Mundo - Instalable</p>
    <button onclick="alert('Funciona offline 🚀')">
      Probar
    </button>
  </div>

  <script>
    // Registrar service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('SW registrado'));
    }
  </script>
</body>
</html>
